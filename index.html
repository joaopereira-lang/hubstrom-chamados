<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamados · Hubstrom</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #249F64; --bg: #0E0F13; --surface: #161820;
    --surface-2: #1E2029; --border: rgba(255,255,255,.07);
    --text: #E8EAF0; --muted: #8B8FA8; --dim: #555869;
    --amber: #F5A623; --r: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .top { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .logo { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 14px; }
  .logo-mark { width: 26px; height: 26px; border-radius: 7px; background: var(--green); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; }
  .top-right { display: flex; align-items: center; gap: 12px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); display: inline-block; margin-right: 4px; }
  .status-dot.ok { background: var(--green); }
  .status-dot.err { background: #ff6060; }
  #syncStatus { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; display: flex; align-items: center; gap: 4px; }

  .page { max-width: 960px; margin: 0 auto; padding: 28px 24px 60px; }
  .page-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  h1 { font-size: 20px; font-weight: 700; }

  .top-actions { display: flex; gap: 8px; }
  .btn-add { display: flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 8px; background: var(--green); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; border: none; cursor: pointer; }
  .btn-add:hover { filter: brightness(1.1); }
  .btn-add:disabled { opacity: .5; cursor: not-allowed; }
  .btn-sec { padding: 9px 14px; border-radius: 8px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
  .btn-sec:hover { border-color: var(--muted); color: var(--text); }

  .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 18px 20px; }
  .kpi-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
  .kpi-val { font-size: 28px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--green); }
  .kpi-val.amber { color: var(--amber); }

  .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; }
  .fg { display: flex; flex-direction: column; gap: 5px; }
  .fl { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
  input, select { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 11px; outline: none; height: 34px; transition: border-color .15s; }
  input:focus, select:focus { border-color: var(--green); }
  input[type="date"] { color-scheme: dark; width: 140px; }
  select { width: 148px; }
  .btn-clear { height: 34px; padding: 0 13px; border-radius: 8px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; align-self: flex-end; }
  .btn-clear:hover { border-color: var(--muted); color: var(--text); }
  .sep { align-self: flex-end; color: var(--dim); font-size: 12px; padding-bottom: 7px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
  .card-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 13px; font-weight: 600; }
  .card-count { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 16px; text-align: left; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; background: var(--surface-2); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  th:hover { color: var(--green); }
  td { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface-2); }
  .mono { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  .chip { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .s { background: rgba(245,166,35,.14); color: #D4900A; }
  .u { background: rgba(36,159,100,.15); color: var(--green); }
  .empty { padding: 48px; text-align: center; color: var(--dim); font-size: 13px; }
  .loading { padding: 48px; text-align: center; color: var(--muted); font-size: 13px; }
  .btn-del { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 13px; padding: 4px 7px; border-radius: 6px; }
  .btn-del:hover { background: rgba(255,80,80,.1); color: #ff6060; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity .18s; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 26px; width: 420px; max-width: 95vw; transform: translateY(12px); transition: transform .18s; }
  .overlay.open .modal { transform: translateY(0); }
  .modal h2 { font-size: 15px; font-weight: 700; margin-bottom: 20px; }
  .mf { display: flex; flex-direction: column; gap: 14px; }
  .mf label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 5px; }
  .mf input, .mf select { width: 100%; height: 36px; }
  .mactions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; }
  .btn-cancel { padding: 8px 16px; border-radius: 8px; background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
  .btn-save { padding: 8px 20px; border-radius: 8px; background: var(--green); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; border: none; cursor: pointer; }
  .btn-save:hover { filter: brightness(1.1); }
  .btn-save:disabled { opacity: .5; cursor: not-allowed; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--green); border-radius: 8px; padding: 12px 18px; font-size: 13px; opacity: 0; transform: translateY(8px); transition: all .25s; pointer-events: none; z-index: 200; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.err { border-left-color: #ff6060; }

  @media (max-width: 600px) { .kpis { grid-template-columns: 1fr 1fr; } }
</style>
</head>

// ── JWT / AUTH ────────────────────────────────────────────────────────────────
let accessToken = null;
let tokenExpiry  = 0;

function b64url(str) {
  return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function b64urlUint8(buf) {
  let bin = '';
  new Uint8Array(buf).forEach(b => bin += String.fromCharCode(b));
  return b64url(bin);
}

async function getAccessToken() {
  if (accessToken && Date.now() < tokenExpiry - 60000) return accessToken;

  const now  = Math.floor(Date.now() / 1000);
  const header  = b64url(JSON.stringify({ alg:'RS256', typ:'JWT' }));
  const payload = b64url(JSON.stringify({
    iss: SA_EMAIL,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    aud: 'https://oauth2.googleapis.com/token',
    exp: now + 3600,
    iat: now,
  }));

  const sigInput = `${header}.${payload}`;

  // Import private key
  const pemBody = SA_KEY.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g, '');
  const derBuf  = Uint8Array.from(atob(pemBody), c => c.charCodeAt(0));
  const cryptoKey = await crypto.subtle.importKey(
    'pkcs8', derBuf.buffer,
    { name:'RSASSA-PKCS1-v1_5', hash:'SHA-256' },
    false, ['sign']
  );

  const sigBuf  = await crypto.subtle.sign(
    'RSASSA-PKCS1-v1_5', cryptoKey,
    new TextEncoder().encode(sigInput)
  );
  const jwt = `${sigInput}.${b64urlUint8(sigBuf)}`;

  const resp = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`,
  });
  const data = await resp.json();
  if (!data.access_token) throw new Error('Falha ao obter token: ' + JSON.stringify(data));
  accessToken = data.access_token;
  tokenExpiry = Date.now() + data.expires_in * 1000;
  return accessToken;
}

// ── SHEETS API ────────────────────────────────────────────────────────────────
async function sheetsGet(range) {
  const token = await getAccessToken();
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}`;
  const r = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if (!r.ok) throw new Error('Erro ao ler planilha: ' + r.status);
  return r.json();
}

async function sheetsAppend(values) {
  const token = await getAccessToken();
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`;
  const r = await fetch(url, {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values }),
  });
  if (!r.ok) throw new Error('Erro ao gravar: ' + r.status);
  return r.json();
}

async function sheetsClear(rowIndex) {
  // rowIndex = 1-based row number in sheet (row 1 = header)
  const token = await getAccessToken();
  const range = `${SHEET_NAME}!A${rowIndex}:C${rowIndex}`;
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:clear`;
  const r = await fetch(url, {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
  });
  if (!r.ok) throw new Error('Erro ao excluir: ' + r.status);
  return r.json();
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let records = []; // { rowIndex, razao, uid, data, tipo }
let sk = 'data', sa = false;

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadData() {
  setStatus('conectando…', '');
  try {
    // Garante cabeçalho na planilha
    const check = await sheetsGet(`${SHEET_NAME}!A1:D1`);
    if (!check.values || check.values[0]?.[0] !== 'Razão Social') {
      await sheetsAppend([['Razão Social','Data','Tipo de Chamado']]);
    }

    const res = await sheetsGet(`${SHEET_NAME}!A2:C`);
    records = [];
    if (res.values) {
      res.values.forEach((row, i) => {
        if (!row[0] && !row[1]) return; // linha vazia (de exclusões)
        records.push({
          rowIndex: i + 2,
          razao: row[0] || '',
          data:  normalizeDate(row[1] || ''),
          tipo:  row[2] || '',
        });
      });
    }
    setStatus('conectado', 'ok');
    document.getElementById('btnAdd').disabled = false;
    document.getElementById('loadingState').style.display = 'none';
    render();
  } catch(e) {
    setStatus('erro de conexão', 'err');
    document.getElementById('loadingState').textContent = 'Erro ao conectar com o Google Sheets. Verifique sua conexão.';
    toast('Erro: ' + e.message, true);
  }
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
// Converte qualquer formato de data para YYYY-MM-DD (para filtros funcionarem)
function normalizeDate(val) {
  if (!val) return '';
  // Já está no formato DD/MM/YYYY
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(val)) {
    const [d,m,y] = val.split('/');
    return `${y}-${m}-${d}`;
  }
  // Já está no formato YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
  // Número serial do Sheets (ex: 46183)
  const n = Number(val);
  if (!isNaN(n) && n > 40000) {
    const d = new Date(Math.round((n - 25569) * 86400 * 1000));
    const yy = d.getUTCFullYear();
    const mm = String(d.getUTCMonth()+1).padStart(2,'0');
    const dd = String(d.getUTCDate()).padStart(2,'0');
    return `${yy}-${mm}-${dd}`;
  }
  return val;
}

const fmt = d => d ? d.split('-').reverse().join('/') : '—';

function setStatus(text, state) {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (state ? ' ' + state : '');
}

function toast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function filtered() {
  const tipo = document.getElementById('fTipo').value;
  const de   = document.getElementById('fDe').value;
  const ate  = document.getElementById('fAte').value;
  return records.filter(r =>
    (!tipo || r.tipo === tipo) &&
    (!de   || r.data >= de)   &&
    (!ate  || r.data <= ate)
  );
}

function render() {
  const rows = filtered().sort((a, b) => {
    const av = a[sk] || '', bv = b[sk] || '';
    return sa ? av.localeCompare(bv) : bv.localeCompare(av);
  });

  document.getElementById('kTotal').textContent    = rows.length;
  document.getElementById('kSuporte').textContent  = rows.filter(r => r.tipo === 'Suporte').length;
  document.getElementById('kUsab').textContent     = rows.filter(r => r.tipo === 'Usabilidade').length;
  document.getElementById('tCount').textContent =
    rows.length === records.length
      ? `${records.length} registro${records.length !== 1 ? 's' : ''}`
      : `${rows.length} de ${records.length} registros`;

  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  if (!rows.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${r.razao}</td>
      <td class="mono">${fmt(r.data)}</td>
      <td><span class="chip ${r.tipo === 'Suporte' ? 's' : 'u'}">${r.tipo}</span></td>
      <td><button class="btn-del" onclick="del(${r.rowIndex})" title="Excluir">✕</button></td>
    </tr>
  `).join('');
}

function sortBy(k) { sk === k ? sa = !sa : (sk = k, sa = true); render(); }

// ── CRUD ──────────────────────────────────────────────────────────────────────
async function del(rowIndex) {
  if (!confirm('Excluir este chamado? Não será possível desfazer.')) return;
  setStatus('salvando…', '');
  try {
    await sheetsClear(rowIndex);
    await loadData();
    toast('Chamado excluído.');
  } catch(e) {
    setStatus('erro', 'err');
    toast('Erro ao excluir: ' + e.message, true);
  }
}

function openModal() {
  document.getElementById('mRazao').value = '';
  document.getElementById('mData').value  = new Date().toISOString().slice(0, 10);
  document.getElementById('mTipo').value  = 'Suporte';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('mRazao').focus(), 100);
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }

async function saveRecord() {
  const razao = document.getElementById('mRazao').value.trim();
  const data  = document.getElementById('mData').value;
  const tipo  = document.getElementById('mTipo').value;
  if (!razao) { alert('Preencha a Razão Social.'); return; }

  document.getElementById('btnSave').disabled = true;
  document.getElementById('btnSave').textContent = 'Salvando…';
  setStatus('salvando…', '');

  try {
    const dateFmt = data ? data.split('-').reverse().join('/') : '';
    await sheetsAppend([[razao, dateFmt, tipo]]);
    closeModal();
    await loadData();
    toast('Chamado salvo na planilha.');
  } catch(e) {
    setStatus('erro', 'err');
    toast('Erro ao salvar: ' + e.message, true);
  } finally {
    document.getElementById('btnSave').disabled = false;
    document.getElementById('btnSave').textContent = 'Salvar';
  }
}

// ── FILTROS ───────────────────────────────────────────────────────────────────
function applyPeriodo() {
  const v = document.getElementById('fPeriodo').value;
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const ymd = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  if (v === 'hoje') {
    const t = ymd(now);
    document.getElementById('fDe').value = t;
    document.getElementById('fAte').value = t;
  } else if (v === 'mes') {
    document.getElementById('fDe').value  = ymd(new Date(now.getFullYear(), now.getMonth(), 1));
    document.getElementById('fAte').value = ymd(new Date(now.getFullYear(), now.getMonth()+1, 0));
  } else if (v === 'mes_ant') {
    document.getElementById('fDe').value  = ymd(new Date(now.getFullYear(), now.getMonth()-1, 1));
    document.getElementById('fAte').value = ymd(new Date(now.getFullYear(), now.getMonth(), 0));
  }
  render();
}

function clearFilters() {
  ['fTipo','fPeriodo'].forEach(id => document.getElementById(id).value = '');
  ['fDe','fAte'].forEach(id => document.getElementById(id).value = '');
  render();
}

// ── EXPORT CSV ────────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = filtered();
  if (!rows.length) { alert('Nenhum registro para exportar.'); return; }
  const lines = rows.map(r => `"${r.razao}","${fmt(r.data)}","${r.tipo}"`);
  const csv   = 'Razão Social,Data,Tipo de Chamado\n' + lines.join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `chamados_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── LOGIN ─────────────────────────────────────────────────────────────────────
async function hashPassword(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const val = document.getElementById('loginInput').value;
  const hash = await hashPassword(val);
  const correctHash = await hashPassword('6677@hub');
  if (hash === correctHash) {
    sessionStorage.setItem('hub_auth', '1');
    document.getElementById('loginScreen').style.display = 'none';
    loadData();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginInput').value = '';
    document.getElementById('loginInput').focus();
  }
}

// Init: check session
if (sessionStorage.getItem('hub_auth') === '1') {
  document.getElementById('loginScreen').style.display = 'none';
  loadData();
} else {
  setTimeout(() => document.getElementById('loginInput').focus(), 100);
}
